        }
        #app {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 20px 16px 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        .header .logo {
            font-size: 32px;
            margin-bottom: 4px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #f5d742;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(245, 215, 66, 0.15);
        }
        .header .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .header .accent-line {
            width: 50px;
            height: 2px;
            background: #f5d742;
            margin: 10px auto 0 auto;
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(245, 215, 66, 0.2);
        }
        .header .channel-link {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 16px;
            background: rgba(245, 215, 66, 0.08);
            border: 1px solid rgba(245, 215, 66, 0.15);
            border-radius: 20px;
            font-size: 12px;
            color: #f5d742;
            text-decoration: none;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .header .channel-link:active {
            background: rgba(245, 215, 66, 0.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
        }
        .stat-card .num {
            font-size: 20px;
            font-weight: 700;
            color: #f5d742;
            letter-spacing: 0.5px;
        }
        .stat-card .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .stat-card .num.green { color: #6fcf97; }
        .stat-card .num.red { color: #eb5757; }

        .aum-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .aum-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }
        .aum-card .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .aum-card .num {
            font-size: 22px;
            font-weight: 700;
            color: #f5d742;
            letter-spacing: 0.5px;
        }
        .aum-card .num.green { color: #6fcf97; }
        .aum-card .label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .grid.submenu {
            grid-template-columns: 1fr;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
        }
        .card:active {
            transform: scale(0.96);
        }
        .card .icon {
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: rgba(245, 215, 66, 0.04);

        .card .info {
            padding: 12px 14px 14px 14px;
            text-align: center;
        }
        .card .name {
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.5px;
            color: #f0ece6;
        }
        .card .badge {
            display: inline-block;
            font-size: 9px;

            border-radius: 10px;
            margin-top: 4px;
            letter-spacing: 0.5px;
            background: rgba(245, 215, 66, 0.12);
            color: #f5d742;
        }
        .card .badge.green { background: rgba(111, 207, 151, 0.12); color: #6fcf97; }
        .card .badge.red { background: rgba(235, 87, 87, 0.12); color: #eb5757; }

        .back-link {
            display: inline-block;

            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 400;
            color: #f0ece6;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: fit-content;
        }
        .back-link:active {
            background: rgba(255, 255, 255, 0.08);
        }
        .submenu-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .submenu-header .back-link {
            margin-bottom: 0;
        }
        .submenu-header .category-title {
            font-size: 14px;
            font-weight: 400;
            color: #f0ece6;
            letter-spacing: 0.5px;
        }

        .info-block {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px;
            margin-top: 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-block .icon-big {
            font-size: 48px;

        }
        .info-block h3 {
            font-size: 18px;
            font-weight: 600;
            color: #f0ece6;
            margin-bottom: 4px;
        }
        .info-block .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 12px;
        }
        .info-block .section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-block .section h4 {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }
        .info-block .section p {
            font-size: 14px;
            font-weight: 300;
            line-height: 1.7;
            color: #d0d0d0;
            white-space: pre-line;
        }
        .info-block .price {
            font-size: 24px;
            font-weight: 700;
            color: #f5d742;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        .btn-success {
            background: #f5d742;
            color: #0d0d0d;
        }
        .btn-success:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
        .hidden {
            display: none !important;
        }
        .back-btn {
            background: none;
            border: none;
            color: #f0ece6;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            padding: 0;
        }
        .back-btn:active { opacity: 0.6; }

        /* Стиль для кнопки ТГ-КАНАЛ */
        .btn-tg {
            background: rgba(245, 215, 66, 0.12);
            color: #f5d742;
            border: 2px solid rgba(245, 215, 66, 0.25);
            font-weight: 600;
            letter-spacing: 2px;
        }
        .btn-tg:active {
            background: rgba(245, 215, 66, 0.25);
            transform: scale(0.98);
        }
    </style>
</head>
<body>

        <!-- AUM + ПОДПИСЧИКИ -->

        <!-- ДЕТАЛИ -->

            <button class="btn btn-success" id="backToMenuBtn">В главное меню</button>

    <script>
        // ================================================================

        // ================================================================

        const details = {
            'about': {
                icon: '📖',
                name: 'О стратегии',
                subtitle: 'Фьючерсы Медоеда',
                price: 'Версия: 2.0',

                stats: '📊 Винрейт: 68%\n💰 Доходность: +42.7%\n📈 Сделок: 156\n🏆 Фактор прибыли: 2.3',

            },

            },
            'results': {

                subtitle: 'Текущие показатели',
                price: 'Доходность: +42.7%',

                params: '📈 Средний профит: +4.2%\n📉 Средний убыток: -1.8%\n🏆 Фактор прибыли: 2.3\n📅 Период: 2024'
            },
            'subscribe_guide': {
                icon: '📝',
                name: 'Как подписаться',
                subtitle: 'Пошаговая инструкция',
                price: 'Всего 3 шага',
                desc: 'Подпишитесь на канал @filview и начните получать сигналы стратегии Медоеда.',
                stats: '👥 Подписчиков: 1 847\n💰 В управлении: $1 247 500\n📈 Доходность: +42.7%',
                params: '1️⃣ Нажмите кнопку "ТГ-КАНАЛ" внизу\n2️⃣ Перейдите в канал @filview\n3️⃣ Нажмите "Подписаться" в Telegram\n4️⃣ Готово! Вы в стратегии'

            'channel': {

                params: '🔗 Ссылка: t.me/filview\n🦡 Автор: Медоед\n📅 Создан: 2024'
            },
            'positions': {

                name: 'Текущие позиции',
                subtitle: '3 открытые позиции',
                price: 'Общая маржа: $1 250',
                desc: 'Текущие открытые позиции по стратегии Медоеда.',
                stats: '🟢 BTC: BUY @ 62 100 (x3)\n🟡 ETH: Ожидание @ 3 050\n🔴 SOL: SELL @ 168.00 (x2)',
                params: '💰 Общая маржа: $1 250\n📊 Плечо: x2-x3\n🔄 Следующий сигнал: 4H\n📈 Текущий P&L: +2.3%'
            },
            'closed': {
                icon: '✅',
                name: 'Закрытые позиции',
                subtitle: '156 сделок',
                price: 'Общий профит: +$4 270',
                desc: 'Все закрытые сделки стратегии Медоеда.',
                stats: '✅ BTC +3.2%\n✅ ETH +1.8%\n❌ SOL -2.1%\n✅ BTC +4.5%\n✅ ETH +2.3%',
                params: '📈 Винрейт: 68%\n💰 Общая доходность: +42.7%\n📅 Всего: 156 сделок\n📊 Средний профит: +4.2%'
            },
            'detailed': {
                icon: '📈',
                name: 'Детальная статистика',
                subtitle: 'Полный анализ',
                price: 'Доходность: +42.7%',
                desc: 'Подробная статистика стратегии Фьючерсы Медоеда.',
                stats: '📊 Винрейт: 68%\n💰 Прибыль: +$4 270\n📉 Убыток: -$1 230\n🏆 Фактор прибыли: 2.3',
                params: '📈 Sharpe: 1.8\n📊 Win/Loss: 2.3\n🔄 Сделок: 156\n📈 Средняя сделка: +2.8%'
            },
            'monthly': {
                icon: '📅',
                name: 'По месяцам',
                subtitle: '2024 год',
                price: 'Июнь: +8.2%',
                desc: 'Доходность стратегии по месяцам.',
                stats: '📊 Янв: +2.1%\n📊 Фев: +3.4%\n📊 Мар: +5.6%\n📊 Апр: +4.2%\n📊 Май: +7.8%\n📊 Июн: +8.2%',
                params: '📈 Лучший месяц: Июнь (+8.2%)\n📉 Худший месяц: Янв (+2.1%)\n📊 Средняя: +4.6%\n📅 Всего: +42.7%'
            }
        };

        // ================================================================
        // 3. ЛОГИКА
        // ================================================================
        let currentView = 'main';
        let currentCategoryId = null;

        function renderMainMenu() {
            currentView = 'main';
            const grid = document.getElementById('grid');
            grid.className = 'grid';
            grid.innerHTML = '';
            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="icon">${cat.icon}</div>
                    <div class="info">
                        <div class="name">${cat.name}</div>
                        <div class="badge">${cat.items.length}</div>
                    </div>
                `;
                card.onclick = () => renderSubMenu(cat.id);
                grid.appendChild(card);
            });
        }

        function renderSubMenu(categoryId) {
            currentView = 'submenu';
            currentCategoryId = categoryId;
            const category = categories.find(c => c.id === categoryId);
            const grid = document.getElementById('grid');
            grid.className = 'grid submenu';
            grid.innerHTML = '';

            const header = document.createElement('div');
            header.className = 'submenu-header';
            header.innerHTML = `
                <span class="back-link" id="submenuBackBtn">← Назад</span>
                <span class="category-title">${category.icon} ${category.name}</span>
            `;
            grid.appendChild(header);
            document.getElementById('submenuBackBtn').onclick = renderMainMenu;

            category.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const data = details[item.id];
                card.innerHTML = `
                    <div class="icon">${data ? data.icon : '📊'}</div>
                    <div class="info">
                        <div class="name">${item.name}</div>
                        <div class="badge">${item.badge}</div>
                    </div>
                `;
                card.onclick = () => showDetail(item.id);
                grid.appendChild(card);
            });
        }

        function showDetail(id) {
            currentView = 'detail';
            const data = details[id];
            if (!data) return;

            document.getElementById('grid').classList.add('hidden');
            document.getElementById('detail').classList.remove('hidden');

            document.getElementById('detailIcon').textContent = data.icon || '📊';
            document.getElementById('detailName').textContent = data.name;
            document.getElementById('detailSubtitle').textContent = data.subtitle || '';

            document.getElementById('detailPrice').innerHTML = data.price ? `<div class="price">${data.price}</div>` : '';
            document.getElementById('detailDesc').textContent = data.desc || '';
            document.getElementById('detailStats').textContent = data.stats || '';
            document.getElementById('detailParams').textContent = data.params || '';

            try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
        }

        function goToMainMenu() {
            currentView = 'main';
            document.getElementById('grid').classList.remove('hidden');
            document.getElementById('detail').classList.add('hidden');
            renderMainMenu();
        }

        // ================================================================
        // 4. ОБРАБОТЧИКИ
        // ================================================================
        document.getElementById('backBtn').onclick = function() {
            if (currentView === 'detail') {
                document.getElementById('detail').classList.add('hidden');
                document.getElementById('grid').classList.remove('hidden');
                if (currentCategoryId) { renderSubMenu(currentCategoryId); }
                else { renderMainMenu(); }
            }
        };
        document.getElementById('backToMenuBtn').onclick = goToMainMenu;

        // ================================================================
        // 5. ЗАПУСК
        // ================================================================

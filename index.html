                changeDir: '',
                desc: 'Основные правила стратегии Фьючерсы Медоеда.',
                signal: '1️⃣ Вход: подтверждение объёмом\n2️⃣ Выход: Take Profit 2:1\n3️⃣ Стоп: ATR x 1.5',
                levels: '📊 Макс. позиций: 3\n📊 Риск: 5% на сделку',
                params: '📈 Соблюдение правил - обязательно!'
            }
        };

        // ================================================================
        // 2. ЛОГИКА
        // ================================================================

        let currentView = 'main';
        let currentCategoryId = null;

        function renderMainMenu() {
            currentView = 'main';
            const grid = document.getElementById('grid');
            grid.className = 'grid';
            grid.innerHTML = '';
            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="icon">${cat.icon}</div>
                    <div class="info">
                        <div class="name">${cat.name}</div>
                        <div class="badge">${cat.items.length}</div>
                    </div>
                `;
                card.onclick = () => renderSubMenu(cat.id);
                grid.appendChild(card);
            });
        }

        function renderSubMenu(categoryId) {
            currentView = 'submenu';
            currentCategoryId = categoryId;
            const category = categories.find(c => c.id === categoryId);
            const grid = document.getElementById('grid');
            grid.className = 'grid submenu';
            grid.innerHTML = '';

            const header = document.createElement('div');
            header.className = 'submenu-header';
            header.innerHTML = `
                <span class="back-link" id="submenuBackBtn">← Назад</span>
                <span class="category-title">${category.icon} ${category.name}</span>
            `;
            grid.appendChild(header);
            document.getElementById('submenuBackBtn').onclick = renderMainMenu;

            category.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const data = details[item.id];
                const badgeClass = item.badge === 'BUY' ? 'green' : (item.badge === 'SELL' ? 'red' : '');
                card.innerHTML = `
                    <div class="icon">${data ? data.icon : '📊'}</div>
                    <div class="info">
                        <div class="name">${item.name}</div>
                        <div class="badge ${badgeClass}">${item.badge}</div>
                    </div>
                `;
                card.onclick = () => showDetail(item.id);
                grid.appendChild(card);
            });
        }

        function showDetail(id) {
            currentView = 'detail';
            const data = details[id];
            if (!data) return;

            document.getElementById('grid').classList.add('hidden');
            document.getElementById('detail').classList.remove('hidden');

            document.getElementById('detailIcon').textContent = data.icon || '📊';
            document.getElementById('detailName').textContent = data.name;
            document.getElementById('detailSubtitle').textContent = data.subtitle || '';

            const priceHtml = data.price ? `
                <div class="price">
                    ${data.price}
                    ${data.change ? `<span class="change ${data.changeDir || ''}"> ${data.change}</span>` : ''}
                </div>
            ` : '';
            document.getElementById('detailPrice').innerHTML = priceHtml;

            document.getElementById('detailDesc').textContent = data.desc || '';
            document.getElementById('detailSignal').textContent = data.signal || '';
            document.getElementById('detailLevels').textContent = data.levels || '';
            document.getElementById('detailParams').textContent = data.params || '';

            try {
                tg.HapticFeedback.impactOccurred('medium');
            } catch(e) {}
        }

        function goToMainMenu() {
            currentView = 'main';
            document.getElementById('grid').classList.remove('hidden');
            document.getElementById('detail').classList.add('hidden');
            renderMainMenu();
        }

        // ================================================================
        // 3. ОБРАБОТЧИКИ
        // ================================================================

        document.getElementById('backBtn').onclick = function() {
            if (currentView === 'detail') {
                document.getElementById('detail').classList.add('hidden');
                document.getElementById('grid').classList.remove('hidden');
                if (currentCategoryId) {
                    renderSubMenu(currentCategoryId);
                } else {
                    renderMainMenu();
                }
            }
        };
        document.getElementById('backToMenuBtn').onclick = goToMainMenu;

        // ================================================================
        // 4. ЗАПУСК
        // ================================================================

        renderMainMenu();

        try {
            tg.MainButton.setText('Открыть канал');
            tg.MainButton.show();
            tg.MainButton.onClick(function() {
                tg.openTelegramLink('https://t.me/filview');
            });
        } catch(e) {
            console.log('MainButton error:', e);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фьючерсы Медоеда</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 16px;
            color: #f0ece6;
            background: #0d0d0d;
            background-image: radial-gradient(ellipse at 30% 20%, #1a1a1a 0%, #0d0d0d 80%);
            background-attachment: fixed;
        }
        #app {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 20px 16px 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        .header .logo {
            font-size: 32px;
            margin-bottom: 4px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #f5d742;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(245, 215, 66, 0.15);
        }
        .header .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .header .accent-line {
            width: 50px;
            height: 2px;
            background: #f5d742;
            margin: 10px auto 0 auto;
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(245, 215, 66, 0.2);
        }
        .header .channel-link {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 16px;
            background: rgba(245, 215, 66, 0.08);
            border: 1px solid rgba(245, 215, 66, 0.15);
            border-radius: 20px;
            font-size: 12px;
            color: #f5d742;
            text-decoration: none;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .header .channel-link:active {
            background: rgba(245, 215, 66, 0.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
        }
        .stat-card .num {
            font-size: 20px;
            font-weight: 700;
            color: #f5d742;
            letter-spacing: 0.5px;
        }
        .stat-card .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .stat-card .num.green { color: #6fcf97; }
        .stat-card .num.red { color: #eb5757; }

        .aum-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .aum-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }
        .aum-card .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .aum-card .num {
            font-size: 22px;
            font-weight: 700;
            color: #f5d742;
            letter-spacing: 0.5px;
        }
        .aum-card .num.green { color: #6fcf97; }
        .aum-card .label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* КНОПКИ НА ВСЮ ШИРИНУ */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
        }
        .grid.submenu {
            grid-template-columns: 1fr;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
        }
        .card:active {
            transform: scale(0.96);
        }
        .card .icon {
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: rgba(245, 215, 66, 0.04);
        }
        .card .info {
            padding: 12px 14px 14px 14px;
            text-align: center;
        }
        .card .name {
            font-weight: 500;
            font-size: 16px;
            letter-spacing: 0.5px;
            color: #f0ece6;
        }
        .card .badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 12px;
            border-radius: 10px;
            margin-top: 4px;
            letter-spacing: 0.5px;
            background: rgba(245, 215, 66, 0.12);
            color: #f5d742;
        }

        .back-link {
            display: inline-block;
            padding: 6px 14px;
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 400;
            color: #f0ece6;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: fit-content;
        }
        .back-link:active {
            background: rgba(255, 255, 255, 0.08);
        }
        .submenu-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .submenu-header .back-link {
            margin-bottom: 0;
        }
        .submenu-header .category-title {
            font-size: 14px;
            font-weight: 400;
            color: #f0ece6;
            letter-spacing: 0.5px;
        }

        .info-block {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px;
            margin-top: 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-block .icon-big {
            font-size: 48px;
            text-align: center;
            margin-bottom: 12px;
        }
        .info-block h3 {
            font-size: 18px;
            font-weight: 600;
            color: #f0ece6;
            margin-bottom: 4px;
        }
        .info-block .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 12px;
        }
        .info-block .section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-block .section h4 {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }
        .info-block .section p {
            font-size: 14px;
            font-weight: 300;
            line-height: 1.7;
            color: #d0d0d0;
            white-space: pre-line;
        }
        .info-block .price {
            font-size: 24px;
            font-weight: 700;
            color: #f5d742;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        .btn-success {
            background: #f5d742;
            color: #0d0d0d;
        }
        .btn-success:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
        .btn-tg {
            background: rgba(245, 215, 66, 0.12);
            color: #f5d742;
            border: 2px solid rgba(245, 215, 66, 0.25);
            font-weight: 600;
            letter-spacing: 2px;
        }
        .btn-tg:active {
            background: rgba(245, 215, 66, 0.25);
            transform: scale(0.98);
        }
        .hidden {
            display: none !important;
        }
        .back-btn {
            background: none;
            border: none;
            color: #f0ece6;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            padding: 0;
        }
        .back-btn:active { opacity: 0.6; }

        .subscribe-steps {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
        }
        .subscribe-steps .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .subscribe-steps .step:last-child {
            border-bottom: none;
        }
        .subscribe-steps .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(245, 215, 66, 0.12);
            color: #f5d742;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .subscribe-steps .step-text {
            font-size: 14px;
            color: #d0d0d0;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">🦡</div>
            <h1>Фьючерсы Медоеда</h1>
            <div class="sub">AUTO-TRADING STRATEGY</div>
            <div class="accent-line"></div>
            <a href="https://t.me/filview" target="_blank" class="channel-link">📢 @filview</a>
        </div>

        <!-- AUM + ПОДПИСЧИКИ -->
        <div class="aum-grid">
            <div class="aum-card">
                <div class="icon">💰</div>
                <div class="num green" id="aumValue">$1 247 500</div>
                <div class="label">В управлении</div>
            </div>
            <div class="aum-card">
                <div class="icon">👥</div>
                <div class="num" id="subscriberCount">1 847</div>
                <div class="label">Подписчиков</div>
            </div>
        </div>

        <!-- СТАТИСТИКА -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="num green" id="statProfit">+42.7%</div>
                <div class="label">Общая доходность</div>
            </div>
            <div class="stat-card">
                <div class="num green" id="statWinrate">68%</div>
                <div class="label">Винрейт</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statTrades">156</div>
                <div class="label">Сделок</div>
            </div>
        </div>

        <!-- ГЛАВНОЕ МЕНЮ (КНОПКИ НА ВСЮ ШИРИНУ) -->
        <div id="gridContainer">
            <div class="grid" id="grid"></div>
        </div>

        <!-- ДЕТАЛИ -->
        <div class="info-block hidden" id="detail">
            <button class="back-btn" id="backBtn">← Назад</button>
            <div class="icon-big" id="detailIcon">📊</div>
            <h3 id="detailName"></h3>
            <div class="subtitle" id="detailSubtitle"></div>
            <div id="detailPrice"></div>
            
            <!-- Контент для всех страниц -->
            <div id="detailContent">
                <div class="section">
                    <h4 id="detailSection1Title">📝 Описание</h4>
                    <p id="detailDesc"></p>
                </div>
                <div class="section">
                    <h4 id="detailSection2Title">📊 Статистика</h4>
                    <p id="detailStats"></p>
                </div>
                <div class="section">
                    <h4 id="detailSection3Title">⚙️ Параметры</h4>
                    <p id="detailParams"></p>
                </div>
            </div>

            <!-- Контент для подписки (инструкция) -->
            <div id="subscribeContent" class="hidden">
                <div class="section">
                    <h4>📝 Как подписаться</h4>
                    <p id="subscribeDesc"></p>
                </div>
                <div class="subscribe-steps" id="subscribeSteps"></div>
                <button class="btn btn-tg" id="subscribeBtn">📢 Перейти в канал</button>
            </div>

            <button class="btn btn-success" id="backToMenuBtn">На главную</button>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. TELEGRAM WEBAPP
        // ================================================================
        let tg;
        try {
            tg = window.Telegram.WebApp;
            tg.expand();
        } catch(e) {
            tg = {
                expand: function() {},
                MainButton: { show: function() {}, onClick: function() {}, setText: function() {} },
                HapticFeedback: { impactOccurred: function() {} },
                openTelegramLink: function(url) { window.open(url, '_blank'); }
            };
        }

        // ================================================================
        // 2. ДАННЫЕ
        // ================================================================
        
        // Главное меню - 4 кнопки
        const categories = [
            {
                id: 'strategy',
                name: 'О стратегии',
                icon: '📖'
            },
            {
                id: 'stats_detailed',
                name: 'Статистика',
                icon: '📈'
            },
            {
                id: 'portfolio',
                name: 'Портфель',
                icon: '💼'
            },
            {
                id: 'subscribe',
                name: 'Подписаться',
                icon: '🔗'
            }
        ];

        // Данные для страниц
        const detailsData = {
            // --- О СТРАТЕГИИ (всё сразу) ---
            'strategy': {
                icon: '📖',
                name: 'О стратегии',
                subtitle: 'Фьючерсы Медоеда',
                price: 'Версия: 2.0',
                desc: 'Стратегия автоследования на основе трендовых индикаторов и объёмного анализа. Торгуем криптофьючерсы с плечом x2-x3. Таймфрейм 4H.',
                stats: '📊 Винрейт: 68%\n💰 Доходность: +42.7%\n📈 Сделок: 156\n🏆 Фактор прибыли: 2.3',
                params: '🦡 Основа: трендовый анализ\n📊 Индикаторы: EMA, RSI, Volume\n⏳ Таймфрейм: 4H\n📅 Запуск: 2024\n📐 Плечо: x2-x3\n🛡️ Риск: 5% на сделку'
            },
            
            // --- СТАТИСТИКА: ЗА ВСЁ ВРЕМЯ ---
            'all_time': {
                icon: '📊',
                name: 'За всё время',
                subtitle: 'Полная статистика',
                price: 'Доходность: +42.7%',
                desc: 'Статистика стратегии Фьючерсы Медоеда за весь период.',
                stats: '📊 Всего сделок: 156\n✅ Прибыльных: 106\n❌ Убыточных: 50\n📈 Винрейт: 68%\n💰 Общая доходность: +42.7%\n📈 Средний профит: +4.2%\n📉 Средний убыток: -1.8%\n🏆 Фактор прибыли: 2.3\n📊 Sharpe: 1.8',
                params: '📅 Период: 2024\n🔄 Сделок: 156\n📈 Лучшая сделка: +8.2%\n📉 Худшая сделка: -3.5%'
            },
            
            // --- СТАТИСТИКА: ЗА ПОСЛЕДНИЙ МЕСЯЦ ---
            'last_month': {
                icon: '📅',
                name: 'За последний месяц',
                subtitle: 'Июнь 2024',
                price: 'Доходность: +8.2%',
                desc: 'Статистика стратегии за последний месяц (июнь 2024).',
                stats: '📊 Сделок: 24\n✅ Прибыльных: 17\n❌ Убыточных: 7\n📈 Винрейт: 71%\n💰 Доходность: +8.2%\n📈 Средний профит: +5.1%\n📉 Средний убыток: -1.9%',
                params: '📅 Период: Июнь 2024\n🔄 Сделок: 24\n📈 Лучшая сделка: +7.2%\n📉 Худшая сделка: -2.8%'
            },
            
            // --- ПОРТФЕЛЬ: ТЕКУЩИЕ ПОЗИЦИИ ---
            'positions': {
                icon: '💼',
                name: 'Текущие позиции',
                subtitle: '3 открытые позиции',
                price: 'Общая маржа: $1 250',
                desc: 'Текущие открытые позиции по стратегии Медоеда.',
                stats: '🟢 BTC: BUY @ 62 100 (x3)\n🟡 ETH: Ожидание @ 3 050\n🔴 SOL: SELL @ 168.00 (x2)',
                params: '💰 Общая маржа: $1 250\n📊 Плечо: x2-x3\n🔄 Следующий сигнал: 4H\n📈 Текущий P&L: +2.3%'
            },
            
            // --- ПОРТФЕЛЬ: ЗАКРЫТЫЕ ---
            'closed': {
                icon: '✅',
                name: 'Закрытые позиции',
                subtitle: '156 сделок',
                price: 'Общий профит: +$4 270',
                desc: 'Все закрытые сделки стратегии Медоеда.',
                stats: '✅ BTC +3.2%\n✅ ETH +1.8%\n❌ SOL -2.1%\n✅ BTC +4.5%\n✅ ETH +2.3%\n✅ SOL +1.9%\n❌ BTC -1.5%\n✅ ETH +3.1%\n✅ SOL +2.7%\n✅ BTC +5.2%',
                params: '📈 Винрейт: 68%\n💰 Общая доходность: +42.7%\n📅 Всего: 156 сделок\n📊 Средний профит: +4.2%'
            },
            
            // --- ПОДПИСАТЬСЯ (инструкция) ---
            'subscribe': {
                icon: '🔗',
                name: 'Как подписаться',
                subtitle: '3 простых шага',
                price: '',
                desc: 'Подпишитесь на канал @filview и начните получать сигналы стратегии Медоеда.',
                stats: '',
                params: '',
                steps: [
                    'Нажмите кнопку "Перейти в канал" ниже',
                    'Нажмите "Подписаться" в Telegram',
                    'Готово! Вы в стратегии! 🦡'
                ]
            }
        };

        // ================================================================
        // 3. ЛОГИКА
        // ================================================================
        let currentView = 'main';
        let currentCategoryId = null;

        function renderMainMenu() {
            currentView = 'main';
            const grid = document.getElementById('grid');
            grid.className = 'grid';
            grid.innerHTML = '';
            
            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="icon">${cat.icon}</div>
                    <div class="info">
                        <div class="name">${cat.name}</div>
                    </div>
                `;
                card.onclick = function() {
                    if (cat.id === 'strategy') {
                        showDetail('strategy');
                    } else if (cat.id === 'stats_detailed') {
                        renderStatsMenu();
                    } else if (cat.id === 'portfolio') {
                        renderPortfolioMenu();
                    } else if (cat.id === 'subscribe') {
                        showDetail('subscribe');
                    }
                };
                grid.appendChild(card);
            });
        }

        function renderStatsMenu() {
            currentView = 'submenu';
            currentCategoryId = 'stats_detailed';
            const grid = document.getElementById('grid');
            grid.className = 'grid submenu';
            grid.innerHTML = '';

            const header = document.createElement('div');
            header.className = 'submenu-header';
            header.innerHTML = `
                <span class="back-link" id="submenuBackBtn">← Назад</span>
                <span class="category-title">📈 Статистика</span>
            `;
            grid.appendChild(header);
            document.getElementById('submenuBackBtn').onclick = renderMainMenu;

            const statsItems = [
                { id: 'all_time', name: 'За всё время', icon: '📊' },
                { id: 'last_month', name: 'За последний месяц', icon: '📅' }
            ];

            statsItems.forEach(function(item) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="icon">${item.icon}</div>
                    <div class="info">
                        <div class="name">${item.name}</div>
                    </div>
                `;
                card.onclick = function() { showDetail(item.id); };
                grid.appendChild(card);
            });
        }

        function renderPortfolioMenu() {
            currentView = 'submenu';
            currentCategoryId = 'portfolio';
            const grid = document.getElementById('grid');
            grid.className = 'grid submenu';
            grid.innerHTML = '';

            const header = document.createElement('div');
            header.className = 'submenu-header';
            header.innerHTML = `
                <span class="back-link" id="submenuBackBtn">← Назад</span>
                <span class="category-title">💼 Портфель</span>
            `;
            grid.appendChild(header);
            document.getElementById('submenuBackBtn').onclick = renderMainMenu;

            const portfolioItems = [
                { id: 'positions', name: 'Текущие позиции', icon: '📊' },
                { id: 'closed', name: 'Закрытые', icon: '✅' }
            ];

            portfolioItems.forEach(function(item) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="icon">${item.icon}</div>
                    <div class="info">
                        <div class="name">${item.name}</div>
                    </div>
                `;
                card.onclick = function() { showDetail(item.id); };
                grid.appendChild(card);
            });
        }

        function showDetail(id) {
            currentView = 'detail';
            const data = detailsData[id];
            if (!data) return;

            document.getElementById('grid').classList.add('hidden');
            document.getElementById('detail').classList.remove('hidden');

            // Получаем элементы
            const detailContent = document.getElementById('detailContent');
            const subscribeContent = document.getElementById('subscribeContent');

            // Показываем/скрываем блоки
            if (id === 'subscribe') {
                detailContent.classList.add('hidden');
                subscribeContent.classList.remove('hidden');
                
                document.getElementById('subscribeDesc').textContent = data.desc || '';
                const stepsContainer = document.getElementById('subscribeSteps');
                stepsContainer.innerHTML = '';
                if (data.steps) {
                    data.steps.forEach(function(step, index) {
                        const div = document.createElement('div');
                        div.className = 'step';
                        div.innerHTML = `
                            <div class="step-num">${index + 1}</div>
                            <div class="step-text">${step}</div>
                        `;
                        stepsContainer.appendChild(div);
                    });
                }
                document.getElementById('subscribeBtn').onclick = function() {
                    tg.openTelegramLink('https://t.me/filview');
                };
            } else {
                detailContent.classList.remove('hidden');
                subscribeContent.classList.add('hidden');
                
                // Заполняем общие поля
                document.getElementById('detailDesc').textContent = data.desc || '';
                document.getElementById('detailStats').textContent = data.stats || '';
                document.getElementById('detailParams').textContent = data.params || '';
            }

            // Заполняем заголовки
            document.getElementById('detailIcon').textContent = data.icon || '📊';
            document.getElementById('detailName').textContent = data.name;
            document.getElementById('detailSubtitle').textContent = data.subtitle || '';
            document.getElementById('detailPrice').innerHTML = data.price ? '<div class="price">' + data.price + '</div>' : '';

            try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
        }

        function goToMainMenu() {
            currentView = 'main';
            document.getElementById('grid').classList.remove('hidden');
            document.getElementById('detail').classList.add('hidden');
            renderMainMenu();
        }

        // ================================================================
        // 4. ОБРАБОТЧИКИ
        // ================================================================
        document.getElementById('backBtn').onclick = function() {
            if (currentView === 'detail') {
                document.getElementById('detail').classList.add('hidden');
                document.getElementById('grid').classList.remove('hidden');
                if (currentCategoryId === 'stats_detailed') {
                    renderStatsMenu();
                } else if (currentCategoryId === 'portfolio') {
                    renderPortfolioMenu();
                } else {
                    renderMainMenu();
                }
            }
        };
        document.getElementById('backToMenuBtn').onclick = goToMainMenu;

        // ================================================================
        // 5. ЗАПУСК
        // ================================================================
        renderMainMenu();

        // Скрываем кнопку снизу
        try {
            tg.MainButton.hide();
        } catch(e) {}
    </script>
</body>
</html>
